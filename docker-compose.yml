services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: f1-backend
    ports:
      - "8090:8080"
    environment:
      - F1_BEARER_TOKEN=${F1_BEARER_TOKEN}
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: f1-frontend
    ports:
      - "3100:3100"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8090
      - NEXT_PUBLIC_WS_URL=ws://localhost:8090/ws
    depends_on:
      - backend
    restart: unless-stopped
